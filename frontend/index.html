<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#1668ff" />
    <title>GlenIA · Transactions Assistant</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('glenia.theme');
          var theme =
            saved ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-bs-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="app d-flex flex-column min-vh-100 mx-auto px-3 px-sm-4 py-3">
      <header
        class="app-header navbar px-0 py-2 mb-3 border-bottom flex-wrap gap-2"
      >
        <div class="brand d-flex align-items-center gap-2">
          <div class="brand-mark" aria-hidden="true">
            <img
              src="robot.webp"
              alt=""
              class="robot-img"
              onerror="this.remove()"
            />
            <i class="bi bi-robot robot-fallback" aria-hidden="true"></i>
          </div>
          <div class="brand-text d-flex flex-column lh-1">
            <span class="brand-name">GlenIA</span>
            <span class="brand-tagline small">
              <span class="text-body-secondary">Transactions Assistant</span>
              <span class="status-online is-connecting" id="presence-indicator">
                <i class="bi bi-circle-fill" aria-hidden="true"></i>
                <span id="presence-label">Conectando…</span>
              </span>
            </span>
          </div>
        </div>

        <div class="header-actions d-flex align-items-center gap-2 flex-wrap">
          <span
            class="conversation-id badge rounded-pill text-bg-secondary font-monospace"
            id="conversation-id"
            hidden
          ></span>
          <button
            type="button"
            class="theme-toggle btn btn-outline-secondary btn-sm"
            id="theme-toggle"
            aria-label="Toggle color theme"
            title="Toggle theme"
          >
            <i class="bi bi-moon-stars" aria-hidden="true"></i>
            <i class="bi bi-sun-fill" aria-hidden="true"></i>
          </button>
          <button type="button" class="btn btn-outline-primary btn-sm" id="new-conversation">
            <i class="bi bi-plus-lg" aria-hidden="true"></i>
            New conversation
          </button>
        </div>
      </header>

      <div
        class="error-banner alert alert-danger d-flex align-items-center justify-content-between gap-3 mb-3"
        id="error-banner"
        role="alert"
        hidden
      >
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i>
          <span class="error-text" id="error-text"></span>
        </div>
        <button
          type="button"
          class="btn-close"
          id="error-dismiss"
          aria-label="Dismiss"
        ></button>
      </div>

      <main class="layout row g-3 flex-grow-1">
        <div class="col-12 col-lg-8 d-flex">
          <section
            class="chat-panel card flex-fill d-flex flex-column overflow-hidden"
            aria-label="Conversation"
          >
            <div class="messages-wrap position-relative flex-grow-1 d-flex">
              <div class="messages" id="messages"></div>

              <div class="chat-empty" id="chat-empty" aria-hidden="true">
                <div class="welcome-illustration" aria-hidden="true">
                  <img
                    src="robot.webp"
                    alt=""
                    class="robot-img"
                    onerror="this.remove()"
                  />
                  <i class="bi bi-robot robot-fallback" aria-hidden="true"></i>
                </div>
                <h2 class="h4 mb-1">How can I help you?</h2>
                <p class="text-body-secondary mb-0">
                  Ask about an transaction, kick one off, or get a status summary.
                </p>
                <div class="suggestions d-flex flex-wrap justify-content-center gap-2 mt-3">
                  <button
                    type="button"
                    class="suggestion btn btn-outline-secondary btn-sm rounded-pill"
                    data-suggest="What can you help me with?"
                  >
                    What can you help me with?
                  </button>
                  <button
                    type="button"
                    class="suggestion btn btn-outline-secondary btn-sm rounded-pill"
                    data-suggest="Show me the status of my latest transaction."
                  >
                    Check my latest transaction
                  </button>
                  <button
                    type="button"
                    class="suggestion btn btn-outline-secondary btn-sm rounded-pill"
                    data-suggest="Summarize today's failed transactions."
                  >
                    Summarize failed transactions
                  </button>
                  <button
                    type="button"
                    class="suggestion btn btn-outline-secondary btn-sm rounded-pill"
                    data-suggest="Start a new transaction."
                  >
                    Start a new transaction
                  </button>
                </div>
              </div>
            </div>

            <div
              class="typing-indicator d-flex align-items-center gap-2 px-4 pb-3"
              id="typing-indicator"
              hidden
            >
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="typing-label small text-body-secondary" id="typing-label"
                >Assistant is typing</span
              >
            </div>

            <form class="composer d-flex align-items-end gap-2 p-3 border-top" id="composer">
              <div class="composer-field flex-grow-1 d-flex flex-column">
                <textarea
                  id="message-input"
                  class="message-input form-control"
                  placeholder="Message GlenIA..."
                  aria-label="Message GlenIA"
                  rows="1"
                  maxlength="2000"
                ></textarea>
                <div
                  class="composer-meta d-flex justify-content-between align-items-center gap-2 mt-1 px-1"
                >
                  <span class="validation-hint small text-danger" id="validation-hint"></span>
                  <span
                    class="char-counter small text-body-secondary font-monospace ms-auto"
                    id="char-counter"
                    >0 / 2000</span
                  >
                </div>
              </div>
              <button
                type="submit"
                class="send-button btn btn-primary"
                id="send-button"
                aria-label="Send message"
                title="Send"
                disabled
              >
                <i class="bi bi-send-fill" aria-hidden="true"></i>
              </button>
            </form>
          </section>
        </div>

        <div class="col-12 col-lg-4 d-flex">
          <aside
            class="transactions-panel card flex-fill d-flex flex-column p-3 overflow-auto"
            aria-label="Transactions"
          >
            <h2 class="transactions-title">Transactions</h2>
            <p class="transactions-empty text-body-secondary" id="transactions-empty">
              No transactions yet.
            </p>
            <div class="transactions-list d-flex flex-column gap-2" id="transactions-list"></div>
          </aside>
        </div>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>

    <script type="module" src="/app.js"></script>

    <script>
      (function () {
        var root = document.documentElement;
        var toggle = document.getElementById('theme-toggle');
        if (toggle) {
          toggle.addEventListener('click', function () {
            var current =
              root.getAttribute('data-bs-theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            var next = current === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-bs-theme', next);
            try {
              localStorage.setItem('glenia.theme', next);
            } catch (e) {}
          });
        }

        var input = document.getElementById('message-input');
        document.querySelectorAll('[data-suggest]').forEach(function (chip) {
          chip.addEventListener('click', function () {
            if (!input) return;
            input.value = chip.getAttribute('data-suggest');
            input.dispatchEvent(new Event('input', { bubbles: true }));
            input.focus();
          });
        });
      })();
    </script>
  </body>
</html>
